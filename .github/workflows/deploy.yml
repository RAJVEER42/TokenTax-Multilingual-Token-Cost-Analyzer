# ============================================================
# TokenTax — CI/CD Deploy Pipeline
# ============================================================
#
# Fully automated release pipeline:
#   1. Install dependencies
#   2. Run backend tests (362+ tests, ≥90% coverage)
#   3. Run frontend tests (266+ tests, 0 TS errors)
#   4. Build Docker images (multi-stage production)
#   5. Push images to container registry (GHCR)
#   6. Deploy new version
#   7. Run smoke tests
#   8. Alert on failure
#
# Triggers:
#   - Push to main branch (full pipeline)
#   - Git tags v*.*.* (tagged release)
#   - Manual dispatch (for hotfixes)
#
# Zero manual steps. No untracked configuration.
# ============================================================

name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

# Only one deploy at a time per environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository_owner }}/tokentax-api
  WEB_IMAGE: ghcr.io/${{ github.repository_owner }}/tokentax-web

jobs:
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 1: Backend Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test_backend:
    name: "🧪 Backend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    env:
      APP_ENV: testing
      SECRET_KEY: ci-test-secret-key-minimum-32-bytes-long
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/tokentax_test
      REDIS_URL: redis://localhost:6379/1
      CORS_ORIGINS_STR: http://localhost:3000
      TOKENIZERS_PARALLELISM: "false"
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tokentax_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: apps/api/requirements*.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Lint with Ruff
        run: ruff check .

      - name: Run tests with coverage
        run: |
          python -m pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --tb=short \
            --junitxml=junit.xml

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: apps/api/coverage.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: apps/api/junit.xml

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 2: Frontend Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  test_frontend:
    name: "🧪 Frontend Tests"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc -b --noEmit

      - name: Run tests
        run: npx vitest run --reporter=junit --outputFile=junit.xml

      - name: Build production bundle
        run: npm run build

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-test-results
          path: apps/web/junit.xml

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 3: Build & Push Docker Images
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  build_images:
    name: "🐳 Build & Push Images"
    runs-on: ubuntu-latest
    needs: [test_backend, test_frontend]
    permissions:
      contents: read
      packages: write
    outputs:
      api_tag: ${{ steps.meta-api.outputs.tags }}
      web_tag: ${{ steps.meta-web.outputs.tags }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=sha-${GITHUB_SHA::8}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── API Image ─────────────────────────────────────
      - name: API image metadata
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.API_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          file: ./apps/api/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      # ── Web Image ─────────────────────────────────────
      - name: Web image metadata
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.WEB_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./apps/web/Dockerfile.prod
          push: true
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            VITE_API_URL=/api/v1
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 4: Deploy to Production
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  deploy_production:
    name: "🚀 Deploy Production"
    runs-on: ubuntu-latest
    needs: [build_images]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    environment:
      name: production
      url: https://tokentax.io
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e

            cd /opt/tokentax

            # Pull latest compose file
            git pull origin main

            # Pull new images
            docker compose -f docker-compose.prod.yml pull api web

            # Run database migrations
            docker compose -f docker-compose.prod.yml run --rm api \
              alembic upgrade head

            # Rolling restart (zero downtime)
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --build --remove-orphans api

            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --build --remove-orphans web

            # Wait for health checks
            echo "Waiting for API health..."
            for i in $(seq 1 30); do
              if curl -sf http://localhost:8000/api/v1/health/ping > /dev/null; then
                echo "✅ API is healthy"
                break
              fi
              echo "Waiting... ($i/30)"
              sleep 5
            done

            echo "Waiting for Web health..."
            for i in $(seq 1 15); do
              if curl -sf http://localhost/nginx-health > /dev/null; then
                echo "✅ Web is healthy"
                break
              fi
              echo "Waiting... ($i/15)"
              sleep 3
            done

            # Clean up old images
            docker image prune -f

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 5: Smoke Tests
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  smoke_tests:
    name: "🔥 Smoke Tests"
    runs-on: ubuntu-latest
    needs: [deploy_production]
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        env:
          BASE_URL: ${{ secrets.PRODUCTION_URL || 'https://tokentax.io' }}
        run: |
          set -e

          echo "═══════════════════════════════════════"
          echo "  TokenTax Smoke Tests"
          echo "  Target: $BASE_URL"
          echo "═══════════════════════════════════════"

          PASS=0
          FAIL=0

          check() {
            local name="$1" url="$2" expected="$3"
            local status
            status=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 15 "$url" 2>/dev/null || echo "000")
            if [ "$status" = "$expected" ]; then
              echo "✅ $name (HTTP $status)"
              PASS=$((PASS + 1))
            else
              echo "❌ $name (expected $expected, got $status)"
              FAIL=$((FAIL + 1))
            fi
          }

          # Health endpoints
          check "Health ping" "$BASE_URL/api/v1/health/ping" "200"

          # API endpoints
          check "API docs" "$BASE_URL/docs" "200"
          check "Tokenizers" "$BASE_URL/api/v1/tokenizers" "200"
          check "Languages" "$BASE_URL/api/v1/languages" "200"
          check "Metrics" "$BASE_URL/api/v1/metrics" "200"

          # Functional test: analyze endpoint
          ANALYZE_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" --max-time 30 \
            -X POST "$BASE_URL/api/v1/analyze" \
            -H "Content-Type: application/json" \
            -d '{"text":"Hello world","language":"en"}' 2>/dev/null || echo "000")
          if [ "$ANALYZE_STATUS" = "200" ]; then
            echo "✅ Analyze endpoint (HTTP $ANALYZE_STATUS)"
            PASS=$((PASS + 1))
          else
            echo "❌ Analyze endpoint (expected 200, got $ANALYZE_STATUS)"
            FAIL=$((FAIL + 1))
          fi

          # Frontend
          check "Frontend loads" "$BASE_URL" "200"

          # Summary
          echo ""
          echo "═══════════════════════════════════════"
          echo "  Results: $PASS passed, $FAIL failed"
          echo "═══════════════════════════════════════"

          if [ "$FAIL" -gt 0 ]; then
            echo "::error::$FAIL smoke tests failed!"
            exit 1
          fi

  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  # Stage 6: Notify on Failure
  # ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  notify_failure:
    name: "🚨 Alert on Failure"
    runs-on: ubuntu-latest
    needs: [test_backend, test_frontend, build_images, deploy_production, smoke_tests]
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "::error::Deployment pipeline failed!"
          echo "Failed job: ${{ github.job }}"
          echo "Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Slack webhook (if configured)
          if [ -n "${{ secrets.SLACK_WEBHOOK_URL }}" ]; then
            curl -sf -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d '{
                "text": "🚨 TokenTax deployment FAILED",
                "blocks": [
                  {
                    "type": "section",
                    "text": {
                      "type": "mrkdwn",
                      "text": "🚨 *TokenTax Deployment Failed*\n\n*Branch:* `${{ github.ref_name }}`\n*Commit:* `${{ github.sha }}`\n*Author:* ${{ github.actor }}\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>"
                    }
                  }
                ]
              }'
          fi

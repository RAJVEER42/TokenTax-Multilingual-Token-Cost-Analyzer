# ============================================================
# Prometheus Configuration — TokenTax Monitoring
# ============================================================
#
# Scrapes the FastAPI /api/v1/metrics endpoint every 15s
# for application metrics (request count, latency, in-progress).
#
# Alert rules are defined in alerts.yml and evaluated every 15s.
#
# Add additional targets for PostgreSQL exporter, Redis exporter,
# and Node exporter as needed.

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
  external_labels:
    cluster: "tokentax-prod"
    environment: "production"

# ── Alert Rules ───────────────────────────────────────────
rule_files:
  - "alerts.yml"

# ── Alertmanager (optional — configure when Alertmanager is deployed)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

scrape_configs:
  # ── TokenTax API ──────────────────────────────────────
  - job_name: "tokentax-api"
    metrics_path: "/api/v1/metrics"
    scrape_interval: 15s
    static_configs:
      - targets: ["api:8000"]
        labels:
          service: "tokentax-api"

  # ── Prometheus self-monitoring ────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
